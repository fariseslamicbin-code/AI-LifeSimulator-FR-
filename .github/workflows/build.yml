name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create gradlew
        run: |
          cat > gradlew << 'EOF'
          #!/bin/sh
          exec "$JAVA_HOME/bin/java" \
            -classpath "$APP_HOME/gradle/wrapper/gradle-wrapper.jar" \
            org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
          chmod +x gradlew

      - name: Create gradle wrapper properties
        run: |
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Inject API Key
        run: |
          sed -i 's/sk-ant-api03-q4GLI6L7YjE9dyoeia1588VSj9xRGhUBhcojVasPGFEkftu3-IZ6MdVJl1JQPH47d2E2h_GpO76kDFHH8Oz7Wg-ava2IAAA/${{ secrets.ANTHROPIC_API_KEY }}/g' \
          app/src/main/java/com/lifesimulator/data/SimulationRepository.kt

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LifeSimulator-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
